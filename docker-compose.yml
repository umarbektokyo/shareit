services:
  shareit:
    container_name: shareit
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-8080} || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
