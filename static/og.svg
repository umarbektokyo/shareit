<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Share nodes icon (large) -->
  <g transform="translate(480, 140)">
    <!-- Left node -->
    <circle cx="40" cy="80" r="28" fill="#E87D0D" opacity="0.9"/>
    <circle cx="40" cy="80" r="28" fill="none" stroke="#E87D0D" stroke-width="2" opacity="0.4"/>
    <!-- Right top node -->
    <circle cx="200" cy="30" r="28" fill="#E87D0D" opacity="0.9"/>
    <circle cx="200" cy="30" r="28" fill="none" stroke="#E87D0D" stroke-width="2" opacity="0.4"/>
    <!-- Right bottom node -->
    <circle cx="200" cy="130" r="28" fill="#E87D0D" opacity="0.9"/>
    <circle cx="200" cy="130" r="28" fill="none" stroke="#E87D0D" stroke-width="2" opacity="0.4"/>
    <!-- Connection lines -->
    <line x1="65" y1="68" x2="175" y2="42" stroke="#E87D0D" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="65" y1="92" x2="175" y2="118" stroke="#E87D0D" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="390" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="72" font-weight="600" fill="#e6e6e6" letter-spacing="2">ShareIt</text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" fill="#888" letter-spacing="1">Peer-to-peer file transfer in the browser</text>

  <!-- Tech badges -->
  <g transform="translate(410, 480)">
    <rect x="0" y="0" width="80" height="28" rx="6" fill="#E87D0D" opacity="0.15"/>
    <text x="40" y="19" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#E87D0D">WebRTC</text>

    <rect x="100" y="0" width="60" height="28" rx="6" fill="#4b76c2" opacity="0.15"/>
    <text x="130" y="19" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#4b76c2">P2P</text>

    <rect x="180" y="0" width="110" height="28" rx="6" fill="#27ae60" opacity="0.15"/>
    <text x="235" y="19" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#27ae60">Zero Storage</text>

    <rect x="310" y="0" width="80" height="28" rx="6" fill="#e6a817" opacity="0.15"/>
    <text x="350" y="19" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#e6a817">Svelte 5</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="622" width="1200" height="8" fill="#E87D0D" opacity="0.8"/>
</svg>
